    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="R MOTORS — Links oficiais" />
    <title>R MOTORS | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link

    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --text: #f5f5f5;
        --text-muted: #9ca3af;
        --accent: #e50914;
        --accent-hover: #ff1a26;
        --ring: rgba(229, 9, 20, 0.35);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        -webkit-tap-highlight-color: transparent;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1.25rem 2.5rem;
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(229, 9, 20, 0.12), transparent),
          radial-gradient(ellipse 60% 40% at 50% 120%, rgba(229, 9, 20, 0.06), transparent);
      }

      .wrap {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
      }

      .brand {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .brand img {
        width: min(100%, 320px);
        height: auto;
        object-fit: contain;
        display: block;
      }

      .links {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.65rem;
        padding: 1rem 1.25rem;
        border-radius: 999px;
        text-decoration: none;
        color: var(--text);
        font-weight: 500;
        font-size: 0.95rem;
        letter-spacing: 0.02em;
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          transform 0.15s ease,
          box-shadow 0.2s ease;
      }

      .link:hover {
        background: rgba(229, 9, 20, 0.12);
        border-color: rgba(229, 9, 20, 0.45);
        color: #fff;
        box-shadow: 0 0 0 3px var(--ring);
      }

      .link:active {
        transform: scale(0.98);
      }

      .link svg {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        opacity: 0.95;
      }

      .footer {
        margin-top: auto;
        padding-top: 1.5rem;
        font-size: 0.75rem;
        color: var(--text-muted);
        text-align: center;
      }
    </style>
  </head>
